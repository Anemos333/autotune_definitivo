name: Hardening CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  apply-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linux JUCE dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libgl1-mesa-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libcurl4-openssl-dev
      - name: Make patch matching whitespace-tolerant
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('Tools/apply_hardening.py')
          s = p.read_text(encoding='utf-8')
          old = '''def repl(text, old, new, label):
              n=text.count(old)
              if n == 0 and new in text:
                  return text
              if n != 1:
                  raise RuntimeError(f'{label}: expected exactly one match, found {n}')
              return text.replace(old,new,1)'''
          new = '''def repl(text, old, new, label):
              n=text.count(old)
              if n == 1:
                  return text.replace(old,new,1)
              if n == 0 and new in text:
                  return text
              parts = re.split(r'([ \\t]+)', old)
              pattern = ''.join(r'[ \\t]+' if part and part[0] in ' \\t' else re.escape(part) for part in parts)
              matches = list(re.finditer(pattern, text))
              if len(matches) != 1:
                  raise RuntimeError(f'{label}: exact={n}, whitespace_matches={len(matches)}')
              match = matches[0]
              return text[:match.start()] + new + text[match.end():]'''
          if old not in s:
              raise SystemExit('repl helper context not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY
      - name: Apply checked hardening patch
        shell: bash
        run: |
          set +e
          python Tools/apply_hardening.py > hardening_patch.log 2>&1
          code=$?
          cat hardening_patch.log
          echo "$code" > hardening_patch_exit.txt
          exit $code
      - name: Finalize generated source
        if: success()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          cmake = Path('CMakeLists.txt')
          text = cmake.read_text(encoding='utf-8')
          marker = '# Plugin target — VST3 only\n'
          formats = 'set(AUTOTUNE_PLUGIN_FORMATS VST3)\nif(APPLE)\n    list(APPEND AUTOTUNE_PLUGIN_FORMATS AU)\nendif()\n\n'
          if formats not in text:
              text = text.replace(marker, formats + marker, 1)
          text = text.replace('    FORMATS VST3 $<$<PLATFORM_ID:Darwin>:AU>', '    FORMATS ${AUTOTUNE_PLUGIN_FORMATS}')
          cmake.write_text(text, encoding='utf-8', newline='\n')

          processor = Path('Source/PluginProcessor.cpp')
          source = processor.read_text(encoding='utf-8')
          old = '''double MicrotonalAutotuneAudioProcessor::findNearestTarget (double detectedFreqHz) const
          {
              if (detectedFreqHz <= 0.0)
                  return detectedFreqHz;

              auto scaleRatios = getCurrentScaleRatios();
              if (scaleRatios.empty())
                  return detectedFreqHz;

              // Reference: use selected root note frequency
              // Work in log2 space relative to the root.
              double refFreq = getRootFrequency();
              double logRatio = std::log2 (detectedFreqHz / refFreq);'''
          new = '''double MicrotonalAutotuneAudioProcessor::findNearestTarget (double detectedFreqHz) const
          {
              if (detectedFreqHz <= 0.0)
                  return detectedFreqHz;

              const ScaleSnapshot scale = readScaleSnapshot();
              if (scale.count <= 0)
                  return detectedFreqHz;

              // Reference: use the same immutable snapshot as the modern engine.
              const double refFreq = scale.rootFrequency;
              double logRatio = std::log2 (detectedFreqHz / refFreq);'''
          old_loop = '''    for (double ratio : scaleRatios)
              {
                  double logPos = std::log2 (ratio); // [0, ~1)'''
          new_loop = '''    for (int scaleIndex = 0; scaleIndex < scale.count; ++scaleIndex)
              {
                  const double ratio = scale.ratios[static_cast<std::size_t>(scaleIndex)];
                  double logPos = std::log2 (ratio); // [0, ~1)'''
          if old in source:
              source = source.replace(old, new, 1)
          if old_loop in source:
              source = source.replace(old_loop, new_loop, 1)
          processor.write_text(source, encoding='utf-8', newline='\n')
          PY
      - name: Package modified source overlay
        if: success()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil, subprocess
          root = Path.cwd()
          names = subprocess.check_output(['git','diff','--name-only'], text=True).splitlines()
          overlay = root / 'hardening_source_overlay'
          for name in names:
              src = root / name
              if src.is_file():
                  dst = overlay / name
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src, dst)
          (overlay / 'BASE_COMMIT.txt').write_text(subprocess.check_output(['git','rev-parse','origin/main'], text=True), encoding='utf-8')
          (overlay / 'CHANGED_FILES.txt').write_text('\n'.join(names) + '\n', encoding='utf-8')
          subprocess.run(['git','diff','--check'], check=True)
          subprocess.run(['git','diff','--binary','--output=hardening.patch'], check=True)
          shutil.make_archive('hardening_source_overlay', 'zip', overlay)
          PY
      - name: Configure
        if: success()
        shell: bash
        run: |
          set -o pipefail
          extra=""
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            extra="-DAUTOTUNE_ENABLE_SANITIZERS=ON"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJUCE_BUILD_EXTRAS=OFF -DJUCE_BUILD_EXAMPLES=OFF $extra 2>&1 | tee configure.log
      - name: Build tests and plugin
        if: success()
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --config Release --parallel 2 2>&1 | tee build.log
      - name: Run tests
        if: success()
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -o pipefail
          ctest --test-dir build -C Release --output-on-failure 2>&1 | tee ctest.log
      - name: Upload source, VST3 and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            hardening_patch.log
            hardening_patch_exit.txt
            hardening.patch
            hardening_source_overlay.zip
            configure.log
            build.log
            ctest.log
            build/**/*VST3*/**
            build/**/*.vst3/**
            build/Testing/**
